# tmux configuration
# set -ga terminal-overrides ',xterm-kitty:RGB' 
# set -g default-terminal "xterm-kitty"
# set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on
set -sg escape-time 0

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "config reloaded"

set -g prefix C-a

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g detach-on-destroy off

# implement vim motions for pane movement
setw -g mode-keys vi

is_vim="#{m/r:(^|/)n?vim?(diff|x)?$,#{pane_current_command}}"

bind-key -n C-h if-shell -F "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell -F "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell -F "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell -F "$is_vim" "send-keys C-l" "select-pane -R"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Implement pane resizing with alt array keys
unbind Up
unbind Down
unbind Left
unbind Right
bind Up resize-pane -U 5
bind Down resize-pane -D 5
bind Left resize-pane -L 5
bind Right resize-pane -R 5

bind n new-session

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

##### Display Popups #####

bind-key C-f display-popup -E "sesh connect (sesh list --icons | fzf --no-sort --ansi --border-label ' sesh ' --prompt '  ' --header '  esc:quit  enter:connect')"

bind-key C-k display-popup -E "cd ~/Documents/Lavakrew && claude"
bind C-t display-popup \
  -d "#{pane_current_path}" \
  -w 75% \
  -h 75% \
  -E "fish"

##### Display Menu ##### 

bind C-d display-menu -T "#[align=centre]Dotfiles" -x C -y C \
  ".fishrc"            z  "display-popup -E 'fc'" \
  ".tmux.conf"        t  "display-popup -E 'tc'" \
  ".sketchybarrc"     s  "display-popup -d "~/.config/sketchybar" -E 'nvim ~/.config/sketchybar/sketchybarrc'" \
  "aerospace.toml"    a  "display-popup -d "~/.config/aerospace" -E 'nvim ~/.config/aerospace/aerospace.toml'" \
  "Exit"              q  ""


# Fzf over keybinds and run selection (these are not working yet. Nested popup problem)
# bind C-k display-popup -E "bash -i ~/.tmux/scripts/choose-bind.sh"

##### Plugins #####

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'dracula/tmux'
# set -g @plugin 'catppuccin/tmux'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-save 'M-s'
set -g @resurrect-restore 'M-r'

# from omerxx .dotfiles repo 
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"

set -g @catppuccin_status_modules_right "directory date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"

set -g @catppuccin_date_time_text "%H:%M"

set -g @catppuccin_window_status_style "rounded" # can comment this out

set -g status-position top 

bind '|' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
